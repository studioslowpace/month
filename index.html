<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>客舍管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #ddd; padding: 5px; border-radius: 8px; }
        .cell { background: white; min-height: 100px; padding: 5px; cursor: pointer; }
        .event { background: #2b579a; color: white; padding: 3px 6px; border-radius: 4px; font-size: 12px; margin-top: 2px; display: flex; justify-content: space-between; cursor: grab; }
        .admin-panel { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="admin-panel">
    <h3>管理員操作</h3>
    <input type="date" id="e-date">
    <input type="text" id="e-time" placeholder="時間 (如 19:00)">
    <input type="text" id="e-text" placeholder="內容">
    <button onclick="addEvent()">新增活動</button>
</div>

<div class="grid" id="calendar"></div>

<script>
    const client = supabase.createClient('YOUR_URL', 'YOUR_KEY');
    
    // 渲染日曆
    async function fetchEvents() {
        const { data } = await client.from('events').select('*');
        render(data);
    }

    function render(events) {
        const cal = document.getElementById('calendar');
        cal.innerHTML = '';
        for (let i = 1; i <= 30; i++) {
            const dayStr = `2026-06-${i.toString().padStart(2, '0')}`;
            const dayEvents = events.filter(e => e.date === dayStr);
            
            cal.innerHTML += `
                <div class="cell" ondrop="drop(event, '${dayStr}')" ondragover="allowDrop(event)">
                    <div>${i}</div>
                    ${dayEvents.map(e => `
                        <div class="event" draggable="true" ondragstart="drag(event, ${e.id})">
                            ${e.time} ${e.content}
                            <span onclick="deleteEvent(${e.id})" style="cursor:pointer">×</span>
                        </div>
                    `).join('')}
                </div>`;
        }
    }

    // 新增
    async function addEvent() {
        const date = document.getElementById('e-date').value;
        const time = document.getElementById('e-time').value;
        const content = document.getElementById('e-text').value;
        await client.from('events').insert({ date, time, content });
        fetchEvents();
    }

    // 刪除
    async function deleteEvent(id) {
        await client.from('events').delete().eq('id', id);
        fetchEvents();
    }

    // 拖曳功能
    function allowDrop(ev) { ev.preventDefault(); }
    function drag(ev, id) { ev.dataTransfer.setData("id", id); }
    async function drop(ev, newDate) {
        ev.preventDefault();
        const id = ev.dataTransfer.getData("id");
        await client.from('events').update({ date: newDate }).eq('id', id);
        fetchEvents();
    }

    fetchEvents();
</script>
</body>
</html>

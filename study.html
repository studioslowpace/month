<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>空間共學 — Slow Pace Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>
    
    <style>
        /* ==========================================================================
           【1. 全域重設與網頁基礎底色 (Global Reset & Base)】
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang HK', 'Heiti TC', 'Microsoft JhengHei', serif;
            background-color: #ffffff; /* 網頁整體大背景顏色（全白） */
            color: #404040;            /* 全網頁預設文字顏色（深灰） */
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 1500px;
            margin: 0 auto;
            position: relative;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .loading-status {
            text-align: center;
            padding: 50px 0;
            font-size: 16px;
            color: #888;
            letter-spacing: 1px;
        }

        /* ==========================================================================
           【2. 主視覺橫幅區 (Hero Section)】
           ========================================================================== */
        .hero-section {
            position: relative;
            background-image: url('images/study1.jpg'); 
            background-size: cover;
            background-position: bottom center;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-align: center;
            max-width: 1500px;
            margin: 0 auto;
            border-radius: 34px; 
            overflow: hidden;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 750px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            margin-left: auto;   
            margin-right: 5%;    
        }

        .hero-logo-btn {
            background: none; border: none; padding: 0; cursor: pointer;
            position: absolute; bottom: 20px; right: 25px; z-index: 10;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .hero-logo-btn:hover { transform: scale(1.05); opacity: 0.9; }
        .hero-logo-btn img { width: 75px; height: 75px; object-fit: contain; border-radius: 50%; }

        .hero-content h1 { font-size: 38px; margin: 0 0 15px 0; letter-spacing: 3px; font-weight: normal; }
        .hero-content p { font-size: 15px; color: #fff5f0; margin: 0; text-align: left; }

        /* ==========================================================================
           【3. 智慧歸類渲染區：篇章與內容樣式 (Chapter & Modular Layout)】
           ========================================================================== */
        .chapter-section {
            padding: 40px 25px;
            border-radius: 16px;
            margin-bottom: 60px;
            background-color: #ffffff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.02);
            border: 1px solid #f0f0f0;
        }

        .chapter-header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin: 10px 0 30px;
            padding: 15px 30px;
            border-radius: 12px;
            transition: background-color 0.4s ease;
        }
        .chapter-title h2 { font-size: 26px; color: #2c2c2c; font-weight: 500; margin: 0; }

        .inner-item-divider {
            border: 0;
            border-top: 2px dashed #eee;
            margin: 40px 0;
        }

        /* ─── 展覽資料區塊 (Exhibition Block) ─── */
        .exhibition-block {
            display: flex; gap: 50px; margin-bottom: 30px; align-items: flex-start;
        }
        .exhibition-image { flex: 1; min-width: 320px; }
        .exhibition-image img { width: 100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        
        .exhibition-text { flex: 1.4; }
        .exhibition-text h3 { font-size: 22px; margin-top: 0; margin-bottom: 15px; color: #2c2c2c; font-weight: normal; }
        .exhibition-text p { font-size: 15px; margin-bottom: 12px; text-align: justify; color: #4a4a4a; }
        .exhibition-text .date { font-weight: 500; margin: 15px 0; color: #666666; font-size: 14px; }

        .btn {
            display: inline-flex; align-items: center; background-color: #404040; color: #ffffff;
            text-decoration: none; padding: 10px 28px; font-size: 14px; border-radius: 4px; transition: background 0.3s;
        }
        .btn:hover { background-color: #1a1a1a; }
        .btn .arrow { margin-left: 10px; }

        /* ─── 活動資料區塊 (Tour Block) ─── */
        .tour-block { margin-top: 45px; margin-bottom: 15px; }
        .tour-block h4 { font-size: 18px; margin-bottom: 20px; text-align: center; font-weight: normal; color: #444; letter-spacing: 1px; }

        /* ─── 後台權限解鎖按鈕 (Action Buttons) ─── */
        .action-btns { display: none; gap: 10px; }
        .btn-edit, .btn-delete {
            background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.15);
            padding: 6px 14px; font-size: 13px; color: #404040; cursor: pointer; border-radius: 4px;
        }
        .btn-edit:hover { border-color: #404040; background: #ffffff; }
        .btn-delete:hover { border-color: #ff4d4f; color: #ff4d4f; background: #fff1f0; }

        /* ==========================================================================
           【4. 多組相片輪播外觀樣式 (Carousel Engine Layout)】
           ========================================================================== */
        .carousel-container {
            position: relative; max-width: 860px; margin: 0 auto; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-radius: 8px;
            background-color: #1a1a1a; /* 💡 新增：照片未填滿區塊改為深色優雅背板 */
        }
        .carousel-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); width: 100%; }
        .carousel-slide { min-width: 100%; position: relative; }
        
        /* 💡 重點改動 1：改為 contain，確保照片全看見、完全不被裁剪 */
        .carousel-slide img { 
            width: 100%; 
            height: 520px; 
            object-fit: contain; 
            background-color: #1a1a1a; 
        }
        
        .carousel-counter {
            position: absolute; top: 25px; right: 35px; background: rgba(0, 0, 0, 0.4);
            color: #ffffff; padding: 4px 14px; font-size: 13px; border-radius: 20px; opacity: 0; transition: opacity 0.4s; z-index: 10;
        }
        .carousel-caption {
            position: absolute; bottom: 0; left: 0; right: 0; margin: 0; padding: 25px 100px 25px 35px;
            background: rgba(0, 0, 0, 0.6); color: #ffffff; font-size: 14px; opacity: 0;
            transform: translateY(10px); transition: all 0.4s; z-index: 5;
        }
        .carousel-btn {
            position: absolute; top: calc(50% - 22px); background: rgba(255, 255, 255, 0.85);
            border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; z-index: 10;
        }
        .prev-btn { left: 20px; } .next-btn { right: 20px; }
        .carousel-container:hover .carousel-caption { opacity: 1; transform: translateY(0); }
        .carousel-container:hover .carousel-btn, .carousel-container:hover .carousel-counter { opacity: 1; }

        /* ==========================================================================
           【5. 管理員後台彈出視窗表單 (Admin Modal Form)】
           ========================================================================== */
        .admin-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .admin-modal-content {
            background-color: #fff; width: 90%; max-width: 650px; max-height: 85vh;
            overflow-y: auto; padding: 35px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative;
        }
        .admin-modal-content h2 { margin-top: 0; font-size: 22px; border-bottom: 1px solid #eee; padding-bottom: 15px; font-weight: normal; }
        .close-modal-btn { position: absolute; top: 25px; right: 25px; font-size: 24px; color: #aaa; cursor: pointer; border: none; background: none; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: bold; }
        .form-group input[type="text"], .form-group input[type="color"], .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; color: #404040; font-family: inherit;
        }
        .upload-row { display: flex; gap: 10px; margin-top: 6px; }
        .file-label-btn {
            background-color: #eaeaea; color: #333; padding: 8px 16px; font-size: 13px; border-radius: 4px; cursor: pointer; display: inline-block; border: 1px solid #ccc;
        }
        .file-label-btn:hover { background-color: #dddddd; }
        .upload-status-text { font-size: 12px; color: #2b73ff; display: flex; align-items: center; font-weight: 500; }

        .form-hint { font-size: 12px; color: #999; margin-top: 4px; line-height: 1.5; }
        .form-submit-btn { width: 100%; padding: 14px; background-color: #404040; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        .form-submit-btn:hover { background-color: #1a1a1a; }

        @media (max-width: 768px) {
            .hero-section { height: 240px; border-radius: 16px; }
            .hero-content h1 { font-size: 16px; } .hero-content p { font-size: 10px; }
            .chapter-section { padding: 20px 10px; }
            .chapter-header-wrap { flex-direction: column; padding: 15px; align-items: flex-start; gap: 10px; }
            .exhibition-block { flex-direction: column; gap: 20px; }
            .exhibition-image { min-width: 100%; }
            .carousel-slide img { height: 340px; }
            .carousel-caption, .carousel-btn, .carousel-counter { opacity: 1; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <button class="hero-logo-btn" id="secretAdminLogo" title="管理員登入">
            <img src="images/logo-small2.png" alt="Logo" oncontextmenu="return false;" ondragstart="return false;">
        </button>
        <div class="hero-content">
            <h1>空間共學</h1>
            <p>以空間共學這個模式作為試驗，嘗試連結來自不同空間的人<br>讓大家可以到這裏一起分享、學習。</p>
        </div>
    </section>

    <main class="container" id="dynamicContainer">
        <div class="loading-status">正在載入篇章資料...</div>
    </main>

    <div class="admin-modal" id="adminModal">
        <div class="admin-modal-content">
            <button class="close-modal-btn" id="closeAdminBtn">&times;</button>
            <h2 id="modalFormTitle">管理展覽與活動項目</h2>
            
            <form id="chapterForm">
                <input type="hidden" id="editChapterId" value="">

                <div class="form-group">
                    <label for="chapterTitle">篇章名稱 *</label>
                    <input type="text" id="chapterTitle" placeholder="例如：大澳篇、深水埗篇" required>
                </div>

                <div class="form-group">
                    <label for="chapterBgColor">篇章標題列背景顏色</label>
                    <input type="color" id="chapterBgColor" value="#f5f5f5">
                </div>
                
                <div class="form-group">
                    <label for="exTitle">展覽名稱 *</label>
                    <input type="text" id="exTitle" placeholder="例如：展覽《水鄉印象》" required>
                </div>

                <div class="form-group">
                    <label for="exImage">展覽海報圖片網址 *</label>
                    <input type="text" id="exImage" placeholder="可在下方直接上傳..." required>
                    <div class="upload-row">
                        <label class="file-label-btn" for="exImageFile">📷 點此上傳本機海報</label>
                        <input type="file" id="exImageFile" accept="image/*" style="display:none;">
                        <span class="upload-status-text" id="exUploadStatus"></span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="exDesc1">展覽介紹第一段</label>
                    <textarea id="exDesc1" rows="3" placeholder="請輸入介紹文案..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="exDesc2">展覽介紹第二段 (選填)</label>
                    <textarea id="exDesc2" rows="2" placeholder="請輸入介紹文案..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="exDate">展覽日期</label>
                    <input type="text" id="exDate" placeholder="例如：展覽日期：2026年6月12日">
                </div>
                
                <div class="form-group">
                    <label for="exLink">Wix 作品詳細連結網址</label>
                    <input type="text" id="exLink" placeholder="https://...">
                </div>

                <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">

                <div class="form-group">
                    <label for="tourTitle">活動/導賞標題 (選填)</label>
                    <input type="text" id="tourTitle" placeholder="例如：空間共學 — 社區導賞活動">
                </div>
                
                <div class="form-group">
                    <label for="tourImages">活動相片與介紹 (一行一組) (選填)</label>
                    <textarea id="tourImages" rows="4" placeholder="圖片網址 | 這是相片介紹"></textarea>
                    <div class="upload-row" style="margin-top: 8px;">
                        <label class="file-label-btn" for="tourImageFiles">📷 點此批次選擇活動相片 (可多選)</label>
                        <input type="file" id="tourImageFiles" accept="image/*" multiple style="display:none;">
                        <span class="upload-status-text" id="tourUploadStatus"></span>
                    </div>
                </div>
                
                <button type="submit" class="form-submit-btn" id="submitBtn">儲存並發布</button>
            </form>
        </div>
    </div>

    <script>
        // 初始化 Supabase
        window.supabaseUrl = 'https://blqlrxqckiuvgevmakbu.supabase.co';
        window.supabaseKey = 'sb_publishable_qFXwpuGChVdRwjc9K7prVQ_PgYmlnpG';
        window.TABLE_NAME = 'chapters'; 
        window.STORAGE_BUCKET_NAME = 'images'; 
        window.client = supabase.createClient(window.supabaseUrl, window.supabaseKey);

        window.ADMIN_PASSWORD = '123456'; 
        window.isAdminMode = false;        

        // 💡 重點改動 2：整合自動壓縮功能的上傳引擎
        async function uploadAndCompressFile(file, statusEl) {
            try {
                statusEl.textContent = '正在本地壓縮檔案中...';
                
                // 壓縮參數設定：最大 1MB，寬度最高 1200px
                const options = {
                    maxSizeMB: 1,
                    maxWidthOrHeight: 1200,
                    useWebWorker: true
                };
                
                // 執行壓縮
                const compressedFile = await imageCompression(file, options);
                
                statusEl.textContent = '壓縮完成，正在上傳至雲端...';
                
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
                const filePath = `uploads/${fileName}`;

                // 上傳至 Supabase Storage
                const { data, error } = await window.client.storage
                    .from(window.STORAGE_BUCKET_NAME)
                    .upload(filePath, compressedFile);

                if (error) throw error;

                // 取得公開下載網址
                const { data: urlData } = window.client.storage
                    .from(window.STORAGE_BUCKET_NAME)
                    .getPublicUrl(filePath);

                statusEl.textContent = '✅ 處理完成！';
                return urlData.publicUrl;
            } catch (err) {
                statusEl.textContent = '❌ 錯誤：' + err.message;
                console.error(err);
                return null;
            }
        }

        // 單張海報上傳
        document.getElementById('exImageFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const statusEl = document.getElementById('exUploadStatus');
            const publicUrl = await uploadAndCompressFile(file, statusEl);
            if (publicUrl) {
                document.getElementById('exImage').value = publicUrl;
            }
        });

        // 批次相片上傳
        document.getElementById('tourImageFiles').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;
            const statusEl = document.getElementById('tourUploadStatus');
            const textarea = document.getElementById('tourImages');
            
            let currentText = textarea.value.trim();
            statusEl.textContent = `佇列中：準備處理 ${files.length} 張照片...`;

            for (let i = 0; i < files.length; i++) {
                statusEl.textContent = `⏳ 正在處理第 (${i + 1}/${files.length}) 張照片...`;
                const publicUrl = await uploadAndCompressFile(files[i], statusEl);
                if (publicUrl) {
                    if (currentText !== '') currentText += '\n';
                    currentText += `${publicUrl} | `;
                }
            }
            textarea.value = currentText;
            statusEl.textContent = `✅ 全數壓縮並上傳成功！`;
        });


        // ─── 資料庫捞取與畫面渲染 ───
        window.fetchAndRenderChapters = async function() {
            const containerEl = document.getElementById('dynamicContainer');

            try {
                const { data: records, error } = await window.client
                    .from(window.TABLE_NAME)
                    .select(`*, carousel_slides (*)`)
                    .order('created_at', { ascending: true });

                if (error) throw error;
                if (!records || records.length === 0) {
                    containerEl.innerHTML = '<div class="loading-status">目前尚無資料，請解鎖管理員新增。</div>';
                    return;
                }

                containerEl.innerHTML = '';
                window.loadedChaptersCache = records;

                const groupedChapters = {};
                records.forEach(rec => {
                    const groupName = rec.title.trim();
                    if (!groupedChapters[groupName]) {
                        groupedChapters[groupName] = {
                            title: groupName,
                            bg_color: rec.bg_color || '#f5f5f5',
                            items: []
                        };
                    }
                    groupedChapters[groupName].items.push(rec);
                });

                Object.values(groupedChapters).forEach((group) => {
                    const chapterSec = document.createElement('section');
                    chapterSec.className = 'chapter-section';

                    let htmlContent = `
                        <div class="chapter-header-wrap" style="background-color: ${group.bg_color};">
                            <div class="chapter-title"><h2>${group.title}</h2></div>
                        </div>
                    `;

                    group.items.forEach((item, index) => {
                        if (index > 0) {
                            htmlContent += `<hr class="inner-item-divider">`;
                        }

                        const slides = item.carousel_slides || [];
                        slides.sort((a, b) => a.sort_order - b.sort_order);

                        htmlContent += `
                            <div class="exhibition-block">
                                <div class="exhibition-image">
                                    <img src="${item.ex_image || ''}" alt="${item.ex_title}" oncontextmenu="return false;" ondragstart="return false;">
                                </div>
                                <div class="exhibition-text">
                                    <h3 style="display:flex; justify-content:space-between; align-items:center;">
                                        <span>${item.ex_title}</span>
                                        <div class="action-btns" id="btns-${item.id}" style="display: ${window.isAdminMode ? 'flex' : 'none'};">
                                            <button class="btn-edit" onclick="window.openEditModal(${item.id})">修改</button>
                                            <button class="btn-delete" onclick="window.deleteChapter(${item.id})">刪除</button>
                                        </div>
                                    </h3>
                                    ${item.ex_desc_1 ? `<p>${item.ex_desc_1}</p>` : ''}
                                    ${item.ex_desc_2 ? `<p>${item.ex_desc_2}</p>` : ''}
                                    <p class="date">${item.ex_date || ''}</p>
                                    <a href="${item.ex_link || '#'}" class="btn" target="_blank">
                                        展覽作品 <span class="arrow">&rarr;</span>
                                    </a>
                                </div>
                            </div>
                            
                            ${(item.tour_title || slides.length > 0) ? `
                            <div class="tour-block">
                                ${item.tour_title ? `<h4>${item.tour_title}</h4>` : ''}
                                ${slides.length > 0 ? `
                                <div class="carousel-container">
                                    <div class="carousel-counter"></div>
                                    <button class="carousel-btn prev-btn">&#10094;</button>
                                    <button class="carousel-btn next-btn">&#10095;</button>
                                    <div class="carousel-wrapper">
                                        ${slides.map(slide => `
                                            <div class="carousel-slide">
                                                <img src="${slide.image_url}" alt="照片" oncontextmenu="return false;" ondragstart="return false;">
                                                ${slide.caption ? `<p class="carousel-caption">${slide.caption}</p>` : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                            ` : ''}
                        `;
                    });

                    chapterSec.innerHTML = htmlContent;
                    containerEl.appendChild(chapterSec);

                    chapterSec.querySelectorAll('.carousel-container').forEach(cBox => {
                        window.initCarousel(cBox);
                    });
                });

            } catch (err) {
                console.error(err);
                containerEl.innerHTML = '<div class="loading-status" style="color:red;">載入發生錯誤。</div>';
            }
        };

        // 輪播動畫計算核心
        window.initCarousel = function(container) {
            const wrapper = container.querySelector('.carousel-wrapper');
            const counter = container.querySelector('.carousel-counter');
            const prevBtn = container.querySelector('.prev-btn');
            const nextBtn = container.querySelector('.next-btn');
            const slides = container.querySelectorAll('.carousel-slide');
            if (slides.length <= 1) { if(prevBtn) prevBtn.style.display='none'; if(nextBtn) nextBtn.style.display='none'; return; }
            
            let currentIndex = 0; let timer = null; const total = slides.length;
            function update() { wrapper.style.transform = `translateX(-${currentIndex * 100}%)`; if (counter) counter.textContent = `${currentIndex + 1} / ${total}`; }
            nextBtn.onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % total; update(); };
            prevBtn.onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + total) % total; update(); };
            container.addEventListener('mouseenter', () => { clearInterval(timer); });
            container.addEventListener('mouseleave', () => { timer = setInterval(() => { currentIndex = (currentIndex + 1) % total; update(); }, 4000); });
            timer = setInterval(() => { currentIndex = (currentIndex + 1) % total; update(); }, 4000);
            update();
        };

        // 後台窗體與開關控制
        const modal = document.getElementById('adminModal');
        const form = document.getElementById('chapterForm');
        const submitBtn = document.getElementById('submitBtn');

        document.getElementById('secretAdminLogo').onclick = () => {
            if (window.isAdminMode) { window.openCreateModal(); return; }
            const pwd = prompt('請輸入管理員密碼：');
            if (pwd === window.ADMIN_PASSWORD) {
                window.isAdminMode = true;
                alert('🔓 驗證成功！已開啟修改按鈕。');
                document.querySelectorAll('.action-btns').forEach(b => b.style.display = 'flex');
            }
        };

        window.openCreateModal = function() {
            document.getElementById('modalFormTitle').textContent = '新增展覽/活動項目';
            document.getElementById('editChapterId').value = '';
            document.getElementById('exUploadStatus').textContent = '';
            document.getElementById('tourUploadStatus').textContent = '';
            form.reset();
            modal.style.display = 'flex';
        };

        window.openEditModal = function(id) {
            const item = window.loadedChaptersCache.find(c => c.id === id);
            if (!item) return;

            document.getElementById('modalFormTitle').textContent = `修改項目 — ${item.ex_title}`;
            document.getElementById('editChapterId').value = item.id;
            document.getElementById('chapterTitle').value = item.title;
            document.getElementById('chapterBgColor').value = item.bg_color || '#f5f5f5';
            document.getElementById('exTitle').value = item.ex_title;
            document.getElementById('exImage').value = item.ex_image;
            document.getElementById('exDesc1').value = item.ex_desc_1 || '';
            document.getElementById('exDesc2').value = item.ex_desc_2 || '';
            document.getElementById('exDate').value = item.ex_date || '';
            document.getElementById('exLink').value = item.ex_link || '';
            document.getElementById('tourTitle').value = item.tour_title || '';
            document.getElementById('exUploadStatus').textContent = '';
            document.getElementById('tourUploadStatus').textContent = '';

            const sortedSlides = (item.carousel_slides || []).sort((a,b)=> a.sort_order - b.sort_order);
            const lines = sortedSlides.map(s => s.caption ? `${s.image_url} | ${s.caption}` : s.image_url);
            document.getElementById('tourImages').value = lines.join('\n');

            modal.style.display = 'flex';
        };

        window.deleteChapter = async function(id) {
            if (!confirm('確認刪除此項目嗎？')) return;
            await window.client.from(window.TABLE_NAME).delete().eq('id', id);
            window.fetchAndRenderChapters();
        };

        document.getElementById('closeAdminBtn').onclick = () => modal.style.display = 'none';

        // 提交表單資料
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;

            const editId = document.getElementById('editChapterId').value;
            const chapterTitleStr = document.getElementById('chapterTitle').value.trim();
            
            const payload = {
                title: chapterTitleStr,
                bg_color: document.getElementById('chapterBgColor').value,
                ex_title: document.getElementById('exTitle').value.trim(),
                ex_image: document.getElementById('exImage').value.trim(),
                ex_desc_1: document.getElementById('exDesc1').value.trim(),
                ex_desc_2: document.getElementById('exDesc2').value.trim(),
                ex_date: document.getElementById('exDate').value.trim(),
                ex_link: document.getElementById('exLink').value.trim(),
                tour_title: document.getElementById('tourTitle').value.trim()
            };

            const rawLines = document.getElementById('tourImages').value.split('\n');
            const slideRowsData = [];

            rawLines.forEach((line, idx) => {
                const cleanLine = line.trim();
                if (!cleanLine) return;
                let url = cleanLine;
                let caption = '';
                if (cleanLine.includes('|')) {
                    const parts = cleanLine.split('|');
                    url = parts[0].trim();
                    caption = parts[1] ? parts[1].trim() : '';
                }
                slideRowsData.push({ url, caption, order: idx });
            });

            try {
                let targetId = editId;
                if (editId) {
                    await window.client.from(window.TABLE_NAME).update(payload).eq('id', editId);
                    await window.client.from('carousel_slides').delete().eq('chapter_id', editId);
                } else {
                    const { data: insData } = await window.client.from(window.TABLE_NAME).insert([payload]).select();
                    targetId = insData[0].id;
                }

                if (slideRowsData.length > 0) {
                    const slideRows = slideRowsData.map(item => ({
                        chapter_id: targetId,
                        image_url: item.url,
                        caption: item.caption,
                        sort_order: item.order
                    }));
                    await window.client.from('carousel_slides').insert(slideRows);
                }

                alert('🎉 資料同步成功！');
                modal.style.display = 'none';
                window.fetchAndRenderChapters();
            } catch (err) {
                alert('儲存錯誤：' + err.message);
            } finally {
                submitBtn.disabled = false;
            }
        });

        window.addEventListener('DOMContentLoaded', window.fetchAndRenderChapters);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>空間共學 — Slow Pace Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ==========================================
           1. 全域重設與字型基礎 (Reset & Base)
           ========================================== */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang HK', 'Heiti TC', 'Microsoft JhengHei', serif;
            background-color: #ffffff;
            color: #404040;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .loading-status {
            text-align: center;
            padding: 50px 0;
            font-size: 16px;
            color: #888;
            letter-spacing: 1px;
        }

        /* ==========================================
           2. 主視覺橫幅 (Hero Section) 與 Logo 秘密按鈕
           ========================================== */
        .hero-section {
            position: relative;
            background-image: url('images/study1.jpg');
            background-size: cover;
            /* 💡 關鍵修改：將對齊點完全鎖定在圖片底部 */
            background-position: bottom center;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-align: center;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 750px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            
            /* 💡 核心修改一：文字靠右對齊（若希望文字在區塊內也靠右，可改為 flex-end） */
            align-items: left; 
            
            /* 💡 核心修改二：利用自動左邊距，把整個區塊推到最右邊 */
            margin-left: auto;   
            
            /* 💡 核心修改三：距離最右邊留下一點優雅的距離（例如 8% 或 80px），避免文字貼死邊緣 */
            margin-right: 5%;    
        }

        /* 💡 秘密管理員入口：Logo 樣式（已加入位置微調功能） */
        .hero-logo-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            outline: none;
            
            /* 💡 核心修改：改為絕對定位，直接鎖定在右下角 */
            position: absolute; 
            bottom: 20px;   /* 距離橫幅底部 20 像素，可自由增減數字微調上下 */
            right: 25px;    /* 距離橫幅右側 25 像素，可自由增減數字微調左右 */
            
            /* 移除原本影響定位的推擠邊距 */
            margin: 0;      
            z-index: 10;    /*確保圖片不會被遮罩擋到*/

        }
        .hero-logo-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .hero-logo-btn img {
            width: 75px; 
            height: 75px;
            object-fit: contain;
            border-radius: 50%;
        }

        .hero-content h1 {
            font-size: 38px;
            margin: 0 0 15px 0;
            letter-spacing: 3px;
            font-weight: normal;
            text-align: left;
        }

        .hero-content p {
            font-size: 15px;
            color: #fff5f0;
            margin: 0;
            text-align: left;
        }

        /* ==========================================
           3. 主體內容區域 (Main Content Section)
           ========================================== */
        .chapter-header-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 60px 0 40px;
        }

        .chapter-title {
            margin: 0;
            text-align: center;
        }

        .chapter-title h2 {
            font-size: 30px;
            color: #2c2c2c;
            font-weight: normal;
            letter-spacing: 1px;
            margin: 0;
        }

        /* 💡 修改與刪除小按鈕（預設隱藏：display: none） */
        .action-btns {
            display: none; 
            gap: 10px;
        }
        .btn-edit, .btn-delete {
            background: none;
            border: 1px solid #ccc;
            padding: 4px 12px;
            font-size: 12px;
            color: #777;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .btn-edit:hover { border-color: #404040; color: #1a1a1a; background: #f9f9f9; }
        .btn-delete:hover { border-color: #ff4d4f; color: #ff4d4f; background: #fff1f0; }

        .exhibition-block {
            display: flex;
            gap: 50px;
            margin-bottom: 60px;
            align-items: flex-start;
        }

        .exhibition-image {
            flex: 1;
            min-width: 320px;
        }

        .exhibition-image img {
            width: 100%;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .exhibition-text {
            flex: 1.4;
        }

        .exhibition-text h3 {
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #2c2c2c;
            font-weight: normal;
            line-height: 1.5;
        }

        .exhibition-text p {
            font-size: 15px;
            margin-bottom: 18px;
            text-align: justify;
            color: #4a4a4a;
        }

        .exhibition-text .date {
            font-weight: 500;
            margin: 25px 0;
            color: #666666;
            font-size: 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            background-color: #404040;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 32px;
            font-size: 14px;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn:hover { background-color: #1a1a1a; }
        .btn .arrow { margin-left: 10px; font-size: 16px; }

        .divider {
            border: 0;
            height: 1px;
            background: #ededed;
            margin: 70px 0;
        }

        .section-break {
            border: 0;
            height: 1px;
            background: #404040;
            width: 50px;
            margin: 100px auto;
        }

        .tour-block h3 {
            font-size: 22px;
            margin-bottom: 35px;
            text-align: center;
            font-weight: normal;
        }

        /* ==========================================
           4. 動態多組輪播樣式
           ========================================== */
        .carousel-container {
            position: relative;
            max-width: 860px;
            margin: 0 auto 40px auto;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-radius: 4px;
        }

        .carousel-wrapper {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            position: relative;
            box-sizing: border-box;
        }

        .carousel-slide img {
            width: 100%;
            height: 520px;
            object-fit: cover;
        }

        .carousel-counter {
            position: absolute;
            bottom: 25px; right: 35px;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 4px 14px;
            font-size: 13px;
            border-radius: 20px;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .carousel-caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            margin: 0;
            padding: 25px 100px 25px 35px;
            background: rgba(0, 0, 0, 0.55);
            color: #ffffff;
            font-size: 15px;
            letter-spacing: 1px;
            text-align: left;
            backdrop-filter: blur(4px);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 5;
        }

        .carousel-btn {
            position: absolute;
            top: calc(50% - 22px);
            background: rgba(255, 255, 255, 0.85);
            border: none;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .carousel-btn:hover { background: rgba(255, 255, 255, 1); }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        .carousel-container:hover .carousel-caption { opacity: 1; transform: translateY(0); }
        .carousel-container:hover .carousel-btn,
        .carousel-container:hover .carousel-counter { opacity: 1; }

        /* ==========================================
           5. 管理員功能表單彈出視窗 (Modal)
           ========================================== */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .admin-modal-content {
            background-color: #fff;
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 35px;
            border-radius: 6px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
        }
        .admin-modal-content h2 {
            margin-top: 0; font-size: 22px; color: #2c2c2c;
            border-bottom: 1px solid #eee; padding-bottom: 15px; font-weight: normal;
        }
        .close-modal-btn {
            position: absolute; top: 25px; right: 25px; font-size: 24px; color: #aaa;
            cursor: pointer; border: none; background: none;
        }
        .close-modal-btn:hover { color: #333; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 500; }
        .form-group input[type="text"], .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; color: #404040; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #404040; }
        .form-hint { font-size: 12px; color: #999; margin-top: 4px; }
        .form-submit-btn {
            width: 100%; padding: 14px; background-color: #404040; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; letter-spacing: 1px; transition: background 0.3s;
        }
        .form-submit-btn:hover { background-color: #1a1a1a; }
        .form-submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        @media (max-width: 768px) {
            .hero-section { height: 240px; }
            .hero-content { max-width: 180px;margin-right: 2%; }
            .hero-content h1 { font-size: 16px; }
            .hero-content p { font-size: 10px; }
            .hero-logo-btn { width: 40px; height: 40px; bottom: 29px; right: 15px;}
            .exhibition-block { flex-direction: column; gap: 30px; }
            .exhibition-image { min-width: 100%; }
            .carousel-slide img { height: 340px; }
            .carousel-caption, .carousel-btn, .carousel-counter { opacity: 1; transform: translateY(0); }
            .carousel-caption { padding: 15px 75px 15px 20px; font-size: 13px; text-align: left; }
            .carousel-counter { bottom: 15px; right: 20px; padding: 2px 10px; font-size: 11px; }
            .admin-modal-content { padding: 20px; width: 95%; }
            .chapter-header-wrap { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <button class="hero-logo-btn" id="secretAdminLogo" title="管理員登入">
                <img src="images/logo-small2.png" alt="空間客舍 Logo" oncontextmenu="return false;" ondragstart="return false;">
        </button>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            
            <h1>空間共學</h1>
            <p>以空間共學這個模式作為試驗，嘗試連結來自不同空間的人<br>讓大家可以到這裏一起分享、學習。</p>
        </div>
    </section>

    <main class="container" id="dynamicContainer">
        <div class="loading-status">正在載入篇章資料...</div>
    </main>

    <div class="admin-modal" id="adminModal">
        <div class="admin-modal-content">
            <button class="close-modal-btn" id="closeAdminBtn">&times;</button>
            <h2 id="modalFormTitle">新增章節內容</h2>
            
            <form id="chapterForm">
                <input type="hidden" id="editChapterId" value="">

                <div class="form-group">
                    <label for="chapterTitle">篇章名稱 *</label>
                    <input type="text" id="chapterTitle" placeholder="例如：大澳篇、深水埗篇" required>
                </div>
                
                <div class="form-group">
                    <label for="exTitle">展覽名稱 *</label>
                    <input type="text" id="exTitle" placeholder="例如：展覽《標題名稱》" required>
                </div>

                <div class="form-group">
                    <label for="exImage">展覽海報圖片網址 *</label>
                    <input type="text" id="exImage" placeholder="https://static.wixstatic.com/..." required>
                </div>
                
                <div class="form-group">
                    <label for="exDesc1">展覽介紹第一段</label>
                    <textarea id="exDesc1" rows="3" placeholder="請輸入展覽文案第一段..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="exDesc2">展覽介紹第二段</label>
                    <textarea id="exDesc2" rows="3" placeholder="請輸入展覽文案第二段（選填）..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="exDate">展覽日期</label>
                    <input type="text" id="exDate" placeholder="例如：展覽日期：2026年6月12日 - 7月12日">
                </div>
                
                <div class="form-group">
                    <label for="exLink">Wix 作品詳細連結網址</label>
                    <input type="text" id="exLink" placeholder="https://studioslowpace.wixsite.com/...">
                </div>

                <hr style="border:0; border-top:1px solid #eee; margin:30px 0;">

                <div class="form-group">
                    <label for="tourTitle">共學活動/導賞活動標題</label>
                    <input type="text" id="tourTitle" placeholder="例如：空間共學 — 大澳社區導賞活動">
                </div>
                
                <div class="form-group">
                    <label for="tourImages">活動輪播相片網址清單 (一行一個網址) *</label>
                    <textarea id="tourImages" rows="5" placeholder="https://image.url.1.jpg&#10;https://image.url.2.jpg" required></textarea>
                    <div class="form-hint">請輸入活動相片的直連網址，換行輸入下一張。系統會自動重新整理生成輪播。</div>
                </div>
                
                <button type="submit" class="form-submit-btn" id="submitBtn">儲存並同步至網站</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 初始化連線資訊
        // ==========================================
        window.supabaseUrl = 'https://blqlrxqckiuvgevmakbu.supabase.co';
        window.supabaseKey = 'sb_publishable_qFXwpuGChVdRwjc9K7prVQ_PgYmlnpG';
        window.TABLE_NAME = 'chapters'; 
        window.client = supabase.createClient(window.supabaseUrl, window.supabaseKey);

        window.ADMIN_PASSWORD = '123456'; // 管理員驗證密碼
        window.isAdminMode = false;              // 紀錄目前是否解鎖了管理員權限

        // ==========================================
        // 2. 從 Supabase 撈取資料並動態渲染前端
        // ==========================================
        window.fetchAndRenderChapters = async function() {
            const containerEl = document.getElementById('dynamicContainer');

            try {
                const { data: chapters, error } = await window.client
                    .from(window.TABLE_NAME)
                    .select(`*, carousel_slides (*)`)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (!chapters || chapters.length === 0) {
                    containerEl.innerHTML = '<div class="loading-status">目前尚無篇章內容，請點選上方 Logo 輸入密碼新增。</div>';
                    return;
                }

                containerEl.innerHTML = '';
                window.loadedChaptersCache = chapters;

                chapters.forEach((chapter, index) => {
                    if (index > 0) {
                        const breakLine = document.createElement('hr');
                        breakLine.className = 'section-break';
                        containerEl.appendChild(breakLine);
                    }

                    const chapterSec = document.createElement('section');
                    chapterSec.className = 'chapter-section';

                    const slides = chapter.carousel_slides || [];
                    slides.sort((a, b) => a.sort_order - b.sort_order);

                    // 💡 注意：這裡的 action-btns 區塊會根據 window.isAdminMode 來決定網頁渲染時是否呈現
                    let htmlContent = `
                        <div class="chapter-header-wrap">
                            <div class="chapter-title">
                                <h2>${chapter.title}</h2>
                            </div>
                            <div class="action-btns" style="display: ${window.isAdminMode ? 'flex' : 'none'};">
                                <button class="btn-edit" onclick="window.openEditModal(${chapter.id})">修改內容</button>
                                <button class="btn-delete" onclick="window.deleteChapter(${chapter.id})">刪除章節</button>
                            </div>
                        </div>
                        <div class="exhibition-block">
                            <div class="exhibition-image">
                                <img src="${chapter.ex_image || ''}" alt="${chapter.ex_title}">
                            </div>
                            <div class="exhibition-text">
                                <h3>${chapter.ex_title}</h3>
                                ${chapter.ex_desc_1 ? `<p>${chapter.ex_desc_1}</p>` : ''}
                                ${chapter.ex_desc_2 ? `<p>${chapter.ex_desc_2}</p>` : ''}
                                <p class="date">${chapter.ex_date || ''}</p>
                                <a href="${chapter.ex_link || '#'}" class="btn" target="_blank">
                                    展覽作品 <span class="arrow">&rarr;</span>
                                </a>
                            </div>
                        </div>
                        <hr class="divider">
                        <div class="tour-block">
                            <h3>${chapter.tour_title || '導賞活動'}</h3>
                            <div class="carousel-container">
                                <div class="carousel-counter"></div>
                                <button class="carousel-btn prev-btn">&#10094;</button>
                                <button class="carousel-btn next-btn">&#10095;</button>
                                <div class="carousel-wrapper">
                    `;

                    slides.forEach(slide => {
                        htmlContent += `
                            <div class="carousel-slide">
                                <img src="${slide.image_url}" alt="${slide.caption || ''}">
                                ${slide.caption ? `<p class="carousel-caption">${slide.caption}</p>` : ''}
                            </div>
                        `;
                    });

                    htmlContent += `
                                </div>
                            </div>
                        </div>
                    `;

                    chapterSec.innerHTML = htmlContent;
                    containerEl.appendChild(chapterSec);

                    const carouselContainer = chapterSec.querySelector('.carousel-container');
                    if (slides.length > 0) {
                        window.initCarousel(carouselContainer);
                    }
                });

            } catch (err) {
                console.error('資料載入失敗:', err);
                containerEl.innerHTML = '<div class="loading-status" style="color:red;">資料載入失敗，請確認 Supabase RLS 是否開啟。</div>';
            }
        };

        // ==========================================
        // 3. 多組獨立自動輪播控制引擎
        // ==========================================
        window.initCarousel = function(container) {
            const wrapper = container.querySelector('.carousel-wrapper');
            const counter = container.querySelector('.carousel-counter');
            const prevBtn = container.querySelector('.prev-btn');
            const nextBtn = container.querySelector('.next-btn');
            const slides = container.querySelectorAll('.carousel-slide');
            
            let currentIndex = 0;
            let timer = null;
            const total = slides.length;

            function updateCarousel() {
                wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
                if (counter) {
                    counter.textContent = `${currentIndex + 1} / ${total}`;
                }
            }

            function nextSlide() {
                currentIndex = (currentIndex + 1) % total;
                updateCarousel();
            }

            function prevSlide() {
                currentIndex = (currentIndex - 1 + total) % total;
                updateCarousel();
            }

            nextBtn.onclick = (e) => { e.stopPropagation(); nextSlide(); };
            prevBtn.onclick = (e) => { e.stopPropagation(); prevSlide(); };

            function startAutoPlay() {
                if (!timer && total > 1) {
                    timer = setInterval(nextSlide, 3500);
                }
            }

            function stopAutoPlay() {
                if (timer) {
                    clearInterval(timer);
                    timer = null;
                }
            }

            updateCarousel();
            startAutoPlay();

            container.onmouseenter = startAutoPlay;
            container.onmouseleave = startAutoPlay;
            container.addEventListener('mouseenter', stopAutoPlay);
            container.addEventListener('mouseleave', startAutoPlay);
        };

        // ==========================================
        // 4. 前台「管理員權限解鎖與按鈕切換」核心邏輯
        // ==========================================
        const modal = document.getElementById('adminModal');
        const form = document.getElementById('chapterForm');
        const submitBtn = document.getElementById('submitBtn');

        // 💡 點擊 Logo 入口
        document.getElementById('secretAdminLogo').onclick = () => {
            // 如果已經是管理員狀態，再次點擊直接開啟新增表單，不需要重複輸入密碼
            if (window.isAdminMode) {
                window.openCreateModal();
                return;
            }

            const pwd = prompt('管理員驗證 — 請輸入密碼：');
            if (pwd === window.ADMIN_PASSWORD) {
                window.isAdminMode = true; // 狀態標記為解鎖
                alert('🔓 管理員權限已解鎖！現已顯示「修改」與「刪除」功能。');
                
                // 1. 讓畫面上所有章節的修改與刪除按鈕顯現
                const actionBtnBlocks = document.querySelectorAll('.action-btns');
                actionBtnBlocks.forEach(block => { block.style.display = 'flex'; });

                // 2. 自動開啟新增視窗
                window.openCreateModal();
            } else if (pwd !== null) { 
                alert('密碼錯誤，存取遭拒！'); 
            }
        };

        // 開啟新增表單公用函式
        window.openCreateModal = function() {
            document.getElementById('modalFormTitle').textContent = '新增章節內容';
            document.getElementById('editChapterId').value = '';
            form.reset();
            modal.style.display = 'flex';
        };

        // 開啟修改表單
        window.openEditModal = function(id) {
            if (!window.isAdminMode) return; // 安全防護

            const chapter = window.loadedChaptersCache.find(c => c.id === id);
            if (!chapter) return;

            document.getElementById('modalFormTitle').textContent = `修改內容 — ${chapter.title}`;
            document.getElementById('editChapterId').value = chapter.id;
            
            document.getElementById('chapterTitle').value = chapter.title;
            document.getElementById('exTitle').value = chapter.ex_title;
            document.getElementById('exImage').value = chapter.ex_image;
            document.getElementById('exDesc1').value = chapter.ex_desc_1 || '';
            document.getElementById('exDesc2').value = chapter.ex_desc_2 || '';
            document.getElementById('exDate').value = chapter.ex_date || '';
            document.getElementById('exLink').value = chapter.ex_link || '';
            document.getElementById('tourTitle').value = chapter.tour_title || '';

            const sortedSlides = (chapter.carousel_slides || []).sort((a,b)=> a.sort_order - b.sort_order);
            const urlsText = sortedSlides.map(s => s.image_url).join('\n');
            document.getElementById('tourImages').value = urlsText;

            modal.style.display = 'flex';
        };

        // 刪除章節功能
        window.deleteChapter = async function(id) {
            if (!window.isAdminMode) return;

            const confirmDelete = confirm('確定要永久刪除整個章節嗎？此操作將永久抹除雲端資料且無法還原！');
            if (!confirmDelete) return;

            try {
                const { error } = await window.client
                    .from(window.TABLE_NAME)
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                alert('章節已成功刪除！');
                window.fetchAndRenderChapters();
            } catch (err) {
                alert('刪除失敗: ' + err.message);
            }
        };

        // 關閉視窗
        document.getElementById('closeAdminBtn').onclick = () => { modal.style.display = 'none'; };
        window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };

        // ==========================================
        // 5. 處理表單提交 (兼容 新增 與 修改)
        // ==========================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = '正在同步至雲端資料庫...';

            const editId = document.getElementById('editChapterId').value;
            
            const payload = {
                title: document.getElementById('chapterTitle').value.trim(),
                ex_title: document.getElementById('exTitle').value.trim(),
                ex_image: document.getElementById('exImage').value.trim(),
                ex_desc_1: document.getElementById('exDesc1').value.trim(),
                ex_desc_2: document.getElementById('exDesc2').value.trim(),
                ex_date: document.getElementById('exDate').value.trim(),
                ex_link: document.getElementById('exLink').value.trim(),
                tour_title: document.getElementById('tourTitle').value.trim()
            };

            const imageUrls = document.getElementById('tourImages').value
                .split('\n').map(url => url.trim()).filter(url => url.length > 0);

            try {
                let targetChapterId = editId;

                if (editId) {
                    const { error: updateError } = await window.client
                        .from(window.TABLE_NAME)
                        .update(payload)
                        .eq('id', editId);
                    if (updateError) throw updateError;

                    await window.client.from('carousel_slides').delete().eq('chapter_id', editId);
                } else {
                    const { data: insertData, error: insertError } = await window.client
                        .from(window.TABLE_NAME)
                        .insert([payload])
                        .select();
                    if (insertError) throw insertError;
                    targetChapterId = insertData[0].id;
                }

                if (imageUrls.length > 0) {
                    const slideRows = imageUrls.map((url, idx) => ({
                        chapter_id: targetChapterId,
                        image_url: url,
                        caption: payload.title + '導賞相片',
                        sort_order: idx
                    }));

                    const { error: slidesError } = await window.client
                        .from('carousel_slides')
                        .insert(slideRows);
                    if (slidesError) throw slidesError;
                }

                alert('🎉 資料雲端同步成功！');
                modal.style.display = 'none';
                form.reset();
                
                // 重新渲染，並保持管理員模式開啟
                window.fetchAndRenderChapters();

            } catch (err) {
                console.error(err);
                alert('儲存失敗: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '儲存並同步至網站';
            }
        });

        // 啟動網頁
        window.addEventListener('DOMContentLoaded', window.fetchAndRenderChapters);
    </script>
</body>
</html>
